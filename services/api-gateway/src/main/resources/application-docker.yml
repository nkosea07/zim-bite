spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/v1/users/**
        - id: vendor-service
          uri: http://vendor-service:8083
          predicates:
            - Path=/api/v1/vendors/**
        - id: menu-service
          uri: http://menu-service:8084
          predicates:
            - Path=/api/v1/menu/**
        - id: meal-builder-service
          uri: http://meal-builder-service:8085
          predicates:
            - Path=/api/v1/meal-builder/**
        - id: order-service
          uri: http://order-service:8086
          predicates:
            - Path=/api/v1/orders/**
        - id: payment-service
          uri: http://payment-service:8087
          predicates:
            - Path=/api/v1/payments/**
        - id: delivery-service
          uri: http://delivery-service:8088
          predicates:
            - Path=/api/v1/deliveries/**
        - id: notification-service
          uri: http://notification-service:8089
          predicates:
            - Path=/api/v1/notifications/**
        - id: analytics-service
          uri: http://analytics-service:8090
          predicates:
            - Path=/api/v1/analytics/**
        - id: subscription-service
          uri: http://subscription-service:8091
          predicates:
            - Path=/api/v1/subscriptions/**
