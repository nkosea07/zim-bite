spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: ${USER_SERVICE_URL:http://user-service:8082}
          predicates:
            - Path=/api/v1/users/**
        - id: vendor-service
          uri: ${VENDOR_SERVICE_URL:http://vendor-service:8083}
          predicates:
            - Path=/api/v1/vendors/**
        - id: menu-service
          uri: ${MENU_SERVICE_URL:http://menu-service:8084}
          predicates:
            - Path=/api/v1/menu/**
        - id: meal-builder-service
          uri: ${MEAL_BUILDER_SERVICE_URL:http://meal-builder-service:8085}
          predicates:
            - Path=/api/v1/meal-builder/**
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://order-service:8086}
          predicates:
            - Path=/api/v1/orders/**
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://payment-service:8087}
          predicates:
            - Path=/api/v1/payments/**
        - id: delivery-service
          uri: ${DELIVERY_SERVICE_URL:http://delivery-service:8088}
          predicates:
            - Path=/api/v1/deliveries/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://notification-service:8089}
          predicates:
            - Path=/api/v1/notifications/**
        - id: analytics-service
          uri: ${ANALYTICS_SERVICE_URL:http://analytics-service:8090}
          predicates:
            - Path=/api/v1/analytics/**
        - id: subscription-service
          uri: ${SUBSCRIPTION_SERVICE_URL:http://subscription-service:8091}
          predicates:
            - Path=/api/v1/subscriptions/**
