spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/users/**
        - id: vendor-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/vendors/**
        - id: menu-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/menu/**
        - id: meal-builder-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/meal-builder/**
        - id: order-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/orders/**
        - id: payment-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/payments/**
        - id: delivery-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/deliveries/**
        - id: notification-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/v1/notifications/**
        - id: analytics-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/analytics/**
server:
  port: 8080
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/javascript,text/css,text/html,text/plain
management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:zimbite-dev-secret-key-min-32-bytes!!}
  access-ttl-seconds: ${JWT_ACCESS_TTL:900}
  refresh-ttl-seconds: ${JWT_REFRESH_TTL:2592000}
