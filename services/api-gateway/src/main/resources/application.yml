spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:docker}
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers:
              - Authorization
              - Content-Type
              - X-Trace-ID
              - X-Idempotency-Key
            exposed-headers:
              - X-Trace-ID
            allow-credentials: true
            max-age: 3600
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/users/**
        - id: vendor-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/vendors/**
        - id: menu-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/menu/**
        - id: meal-builder-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/meal-builder/**
        - id: order-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/orders/**
        - id: payment-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/payments/**
        - id: delivery-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/deliveries/**
        - id: notification-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/v1/notifications/**
        - id: analytics-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/analytics/**
        - id: subscription-service
          uri: http://localhost:8091
          predicates:
            - Path=/api/v1/subscriptions/**
server:
  port: 8080
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/javascript,text/css,text/html,text/plain
management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET}
  access-ttl-seconds: ${JWT_ACCESS_TTL:900}
  refresh-ttl-seconds: ${JWT_REFRESH_TTL:2592000}

gateway:
  rate-limit:
    rules:
      - method: POST
        pattern: /api/v1/auth/**
        limit: ${GATEWAY_RATE_AUTH_LIMIT:5}
        window-seconds: ${GATEWAY_RATE_AUTH_WINDOW_SECONDS:60}
      - method: POST
        pattern: /api/v1/orders
        limit: ${GATEWAY_RATE_ORDERS_LIMIT:20}
        window-seconds: ${GATEWAY_RATE_ORDERS_WINDOW_SECONDS:3600}
      - method: POST
        pattern: /api/v1/payments/initiate
        limit: ${GATEWAY_RATE_PAYMENTS_LIMIT:10}
        window-seconds: ${GATEWAY_RATE_PAYMENTS_WINDOW_SECONDS:3600}
      - method: ~
        pattern: /api/v1/**
        limit: ${GATEWAY_RATE_DEFAULT_LIMIT:120}
        window-seconds: ${GATEWAY_RATE_DEFAULT_WINDOW_SECONDS:60}
