spring:
  application:
    name: delivery-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/zimbite}
    username: ${POSTGRES_USER:zimbite}
    password: ${POSTGRES_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: delivery-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
server:
  port: 8088
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

delivery:
  tracking:
    max-location-age-seconds: ${DELIVERY_TRACKING_MAX_LOCATION_AGE_SECONDS:900}
    max-future-skew-seconds: ${DELIVERY_TRACKING_MAX_FUTURE_SKEW_SECONDS:60}
    max-speed-kmh: ${DELIVERY_TRACKING_MAX_SPEED_KMH:95}
  eta:
    min-speed-kmh: ${DELIVERY_ETA_MIN_SPEED_KMH:12}
    max-speed-kmh: ${DELIVERY_ETA_MAX_SPEED_KMH:38}
