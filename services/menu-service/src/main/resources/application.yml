spring:
  application:
    name: menu-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/zimbite}
    username: ${POSTGRES_USER:zimbite}
    password: ${POSTGRES_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8084
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
