spring:
  application:
    name: payment-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/zimbite}
    username: ${POSTGRES_USER:zimbite}
    password: ${POSTGRES_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
server:
  port: 8087
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

outbox:
  publisher:
    enabled: ${OUTBOX_PUBLISHER_ENABLED:false}
    batch-size: ${OUTBOX_BATCH_SIZE:50}
    fixed-delay-ms: ${OUTBOX_PUBLISHER_DELAY_MS:5000}

payment:
  auto-initiation:
    default-provider: ${PAYMENT_AUTO_PROVIDER:ECOCASH}
