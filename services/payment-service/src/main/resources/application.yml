spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:docker}
  application:
    name: payment-service
  datasource:
    username: ${POSTGRES_USER:zimbite}
    password: ${POSTGRES_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
server:
  port: 8087
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

outbox:
  publisher:
    enabled: ${OUTBOX_PUBLISHER_ENABLED:false}
    batch-size: ${OUTBOX_BATCH_SIZE:50}
    fixed-delay-ms: ${OUTBOX_PUBLISHER_DELAY_MS:5000}

payment:
  auto-initiation:
    default-provider: ${PAYMENT_AUTO_PROVIDER:ECOCASH}
  callbacks:
    signature-enabled: ${PAYMENT_CALLBACK_SIGNATURE_ENABLED:false}
    ecocash-secret: ${PAYMENT_CALLBACK_ECOCASH_SECRET:}
    onemoney-secret: ${PAYMENT_CALLBACK_ONEMONEY_SECRET:}
    card-secret: ${PAYMENT_CALLBACK_CARD_SECRET:}
  reconciliation:
    enabled: ${PAYMENT_RECONCILIATION_ENABLED:true}
    fixed-delay-ms: ${PAYMENT_RECONCILIATION_DELAY_MS:60000}
    stale-after-seconds: ${PAYMENT_RECONCILIATION_STALE_AFTER_SECONDS:900}
    batch-size: ${PAYMENT_RECONCILIATION_BATCH_SIZE:200}
