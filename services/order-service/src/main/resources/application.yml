spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:docker}
  application:
    name: order-service
  datasource:
    username: ${POSTGRES_USER:zimbite}
    password: ${POSTGRES_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          "[batch_size]": 25
        "[order_inserts]": true
        "[order_updates]": true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
server:
  port: 8086
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

outbox:
  publisher:
    enabled: ${OUTBOX_PUBLISHER_ENABLED:false}
    batch-size: ${OUTBOX_BATCH_SIZE:50}
    fixed-delay-ms: ${OUTBOX_PUBLISHER_DELAY_MS:5000}

order:
  delivery:
    timezone: ${ORDER_DELIVERY_TIMEZONE:Africa/Harare}
    window-open-hour: ${ORDER_DELIVERY_WINDOW_OPEN_HOUR:5}
    window-close-hour: ${ORDER_DELIVERY_WINDOW_CLOSE_HOUR:10}
