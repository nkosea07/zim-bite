spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${POSTGRES_DB:zimbite}}
    username: ${POSTGRES_USER:zimbite}
    password: ${POSTGRES_PASSWORD}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

outbox:
  publisher:
    enabled: true
    batch-size: ${OUTBOX_BATCH_SIZE:200}
    fixed-delay-ms: ${OUTBOX_PUBLISHER_DELAY_MS:1000}
