spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/zimbite}
    username: ${POSTGRES_USER:zimbite}
    password: ${POSTGRES_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8081
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  secret: ${JWT_SECRET:zimbite-dev-secret-key-min-32-bytes!!}
  access-ttl-seconds: ${JWT_ACCESS_TTL:900}
  refresh-ttl-seconds: ${JWT_REFRESH_TTL:2592000}

auth:
  otp:
    ttl-seconds: ${AUTH_OTP_TTL_SECONDS:300}
    max-attempts: ${AUTH_OTP_MAX_ATTEMPTS:3}
    dev-static-code: ${AUTH_OTP_DEV_STATIC_CODE:123456}
