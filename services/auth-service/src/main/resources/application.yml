spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:docker}
  application:
    name: auth-service
  datasource:
    username: ${POSTGRES_USER:zimbite}
    password: ${POSTGRES_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          "[batch_size]": 25
        "[order_inserts]": true
        "[order_updates]": true
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8081
  error:
    include-message: always
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  secret: ${JWT_SECRET}
  access-ttl-seconds: ${JWT_ACCESS_TTL:900}
  refresh-ttl-seconds: ${JWT_REFRESH_TTL:2592000}

auth:
  otp:
    ttl-seconds: ${AUTH_OTP_TTL_SECONDS:300}
    max-attempts: ${AUTH_OTP_MAX_ATTEMPTS:3}
    dev-static-code: ${AUTH_OTP_DEV_STATIC_CODE:}
