version: '3.9'
services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8080:8080"

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8081:8081"

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    ports:
      - "8082:8082"

  vendor-service:
    build:
      context: .
      dockerfile: services/vendor-service/Dockerfile
    ports:
      - "8083:8083"

  menu-service:
    build:
      context: .
      dockerfile: services/menu-service/Dockerfile
    ports:
      - "8084:8084"

  meal-builder-service:
    build:
      context: .
      dockerfile: services/meal-builder-service/Dockerfile
    ports:
      - "8085:8085"

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    ports:
      - "8086:8086"

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    ports:
      - "8087:8087"

  delivery-service:
    build:
      context: .
      dockerfile: services/delivery-service/Dockerfile
    ports:
      - "8088:8088"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "8089:8089"

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    ports:
      - "8090:8090"
