name: zimbite
description: "ZimBite - Food delivery for Zimbabwe"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (BLoC)
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # Networking
  dio: ^5.7.0

  # Routing
  go_router: ^14.6.2

  # Storage
  flutter_secure_storage: ^9.2.3

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_dotenv: ^5.2.1
  connectivity_plus: ^6.1.1

  # Rider feature
  geolocator: ^13.0.1
  web_socket_channel: ^3.0.1
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env.dev
    - .env.prod
