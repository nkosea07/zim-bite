# ZimBite — single-command dev stack
# Usage:  docker compose up -d --build
# Makefile shortcuts:  make up | make down | make logs | make restart

# Common env: DB-only services
x-common-env: &common-env
  SPRING_PROFILES_ACTIVE: docker
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  POSTGRES_DB: ${POSTGRES_DB:-zimbite}

# Common env: services that also publish/consume Kafka events
x-kafka-service-env: &kafka-service-env
  SPRING_PROFILES_ACTIVE: docker
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  POSTGRES_DB: ${POSTGRES_DB:-zimbite}
  KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}

# Shared service defaults — native ARM64 build, shared network, auto-restart
x-svc: &svc
  platform: linux/arm64
  restart: on-failure
  networks:
    - zimbite-net

x-db-depends: &db-depends
  postgres:
    condition: service_healthy

x-infra-depends: &infra-depends
  postgres:
    condition: service_healthy
  kafka:
    condition: service_healthy

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgis/postgis:16-3.4
    platform: ${POSTGRES_PLATFORM:-linux/amd64}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-zimbite}
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - zimbite-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-zimbite}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - zimbite-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    platform: linux/amd64
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - zimbite-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    platform: linux/amd64
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - zimbite-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Microservices (all built for native ARM64) ───────────────────────────────

  api-gateway:
    <<: *svc
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      redis:
        condition: service_healthy

  auth-service:
    <<: *svc
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      <<: *common-env
      JWT_SECRET: ${JWT_SECRET}
      AUTH_OTP_DEV_STATIC_CODE: ${AUTH_OTP_DEV_STATIC_CODE:-123456}
    depends_on:
      <<: *db-depends

  user-service:
    <<: *svc
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      <<: *common-env
    depends_on:
      <<: *db-depends

  vendor-service:
    <<: *svc
    build:
      context: .
      dockerfile: services/vendor-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      <<: *common-env
    depends_on:
      <<: *db-depends

  menu-service:
    <<: *svc
    build:
      context: .
      dockerfile: services/menu-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      <<: *common-env
    depends_on:
      <<: *db-depends

  meal-builder-service:
    <<: *svc
    build:
      context: .
      dockerfile: services/meal-builder-service/Dockerfile
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker

  order-service:
    <<: *svc
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    ports:
      - "8086:8086"
    environment:
      <<: *kafka-service-env
    depends_on:
      <<: *infra-depends

  payment-service:
    <<: *svc
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    ports:
      - "8087:8087"
    environment:
      <<: *kafka-service-env
    depends_on:
      <<: *infra-depends

  delivery-service:
    <<: *svc
    build:
      context: .
      dockerfile: services/delivery-service/Dockerfile
    ports:
      - "8088:8088"
    environment:
      <<: *kafka-service-env
    depends_on:
      <<: *infra-depends

  notification-service:
    <<: *svc
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "8089:8089"
    environment:
      <<: *kafka-service-env
    depends_on:
      <<: *infra-depends

  analytics-service:
    <<: *svc
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    ports:
      - "8090:8090"
    environment:
      <<: *kafka-service-env
    depends_on:
      <<: *infra-depends

  subscription-service:
    <<: *svc
    build:
      context: .
      dockerfile: services/subscription-service/Dockerfile
    ports:
      - "8091:8091"
    environment:
      <<: *kafka-service-env
    depends_on:
      <<: *infra-depends

networks:
  zimbite-net:
    driver: bridge

volumes:
  pg_data:
