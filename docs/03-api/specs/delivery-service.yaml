openapi: 3.0.3
info:
  title: ZimBite Delivery Service API
  version: 1.0.0
servers:
  - url: /api/v1/deliveries
security:
  - BearerAuth: []
paths:
  /assign:
    post:
      summary: Assign rider to ready order
      responses:
        '200':
          description: Rider assigned
  /{deliveryId}/status:
    patch:
      summary: Update delivery status
      parameters:
        - in: path
          name: deliveryId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, riderId, status]
              properties:
                orderId:
                  type: string
                  format: uuid
                riderId:
                  type: string
                  format: uuid
                status:
                  type: string
                  description: When value is DELIVERED, a delivery.completed event is published.
      responses:
        '200':
          description: Status updated
  /{deliveryId}/location:
    post:
      summary: Publish rider location update (freshness + outlier validated)
      parameters:
        - in: path
          name: deliveryId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Location accepted
        '422':
          description: Location rejected due to stale/future/outlier telemetry
  /orders/{orderId}/tracking:
    get:
      summary: Get current tracking details for order
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tracking payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId:
                    type: string
                    format: uuid
                  deliveryId:
                    type: string
                    format: uuid
                  riderId:
                    type: string
                    format: uuid
                  status:
                    type: string
                  lastLatitude:
                    type: number
                    format: double
                  lastLongitude:
                    type: number
                    format: double
                  lastUpdatedAt:
                    type: string
                    format: date-time
                  estimatedArrivalAt:
                    type: string
                    format: date-time
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
