openapi: 3.0.3
info:
  title: ZimBite Auth Service API
  version: 1.0.0
servers:
  - url: /api/v1/auth
security: []
paths:
  /register:
    post:
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created
  /login:
    post:
      summary: Authenticate user and issue tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
  /refresh:
    post:
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
  /verify-otp:
    post:
      summary: Verify one-time code during login or registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [principal, otp]
              properties:
                principal:
                  type: string
                otp:
                  type: string
      responses:
        '200':
          description: OTP verified
components:
  schemas:
    RegisterRequest:
      type: object
      required: [first_name, last_name, email, phone_number, password]
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone_number:
          type: string
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required: [principal, password]
      properties:
        principal:
          type: string
        password:
          type: string
    AuthTokens:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
