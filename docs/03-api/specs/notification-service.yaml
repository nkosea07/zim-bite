openapi: 3.0.3
info:
  title: ZimBite Notification Service API
  version: 1.0.0
servers:
  - url: /api/v1/notifications
security:
  - BearerAuth: []
paths:
  /:
    get:
      summary: List notifications for current user
      parameters:
        - in: query
          name: unread_only
          schema:
            type: boolean
      responses:
        '200':
          description: Notification list
  /{notificationId}/read:
    post:
      summary: Mark notification as read
      parameters:
        - in: path
          name: notificationId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Marked read
  /preferences:
    get:
      summary: Get delivery channel preferences
      responses:
        '200':
          description: Preferences
    patch:
      summary: Update delivery channel preferences
      responses:
        '200':
          description: Updated
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
