openapi: 3.0.3
info:
  title: ZimBite Analytics Service API
  version: 1.0.0
servers:
  - url: /api/v1/analytics
security:
  - BearerAuth: []
paths:
  /vendor/{vendorId}/dashboard:
    get:
      summary: Vendor dashboard metrics
      parameters:
        - in: path
          name: vendorId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: KPI summary
  /admin/overview:
    get:
      summary: Platform-wide overview for admins
      responses:
        '200':
          description: Admin overview
  /revenue:
    get:
      summary: Revenue trend by date range and currency
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
        - in: query
          name: currency
          schema:
            type: string
            enum: [USD, ZWL]
      responses:
        '200':
          description: Revenue time series
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
