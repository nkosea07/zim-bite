name: Security Hardening

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run secret scan
        run: ./scripts/run-secret-scan.sh
      - name: Upload secret scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: artifacts/gitleaks-report.json
          if-no-files-found: error

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review (PR delta)
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run dependency vulnerability audit
        env:
          TRIVY_EXIT_CODE: "0"
        run: ./scripts/run-dependency-audit.sh
      - name: Upload dependency audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-dependency-report
          path: artifacts/trivy-dependency.sarif
          if-no-files-found: error
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: artifacts/trivy-dependency.sarif

  jwt-rotation-rehearsal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Run JWT key rotation rehearsal test
        run: ./scripts/run-jwt-rotation-rehearsal.sh
