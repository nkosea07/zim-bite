name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Compile backend modules
        run: mvn -B -DskipTests clean install

  backend-test:
    runs-on: ubuntu-latest
    needs: backend-compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Run backend tests
        run: mvn -B test

  openapi-drift:
    runs-on: ubuntu-latest
    needs: backend-compile
    steps:
      - uses: actions/checkout@v4
      - name: OpenAPI Drift Check
        run: ./scripts/check-openapi-drift.sh

  frontend-build:
    runs-on: ubuntu-latest
    needs: backend-compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        run: npm --prefix frontend/web install
      - name: Build frontend
        run: npm --prefix frontend/web run build
